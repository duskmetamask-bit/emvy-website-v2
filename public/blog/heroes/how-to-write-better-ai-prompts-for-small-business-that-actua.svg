<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0e14" />
  
  <!-- Luminous Accent Stroke (top or subtle edge) -->
  <line x1="0" y1="0" x2="1200" y2="0" stroke="#56d9ff" stroke-width="2" opacity="0.5" />
  
  <!-- Eyebrow Label -->
  <text x="80" y="240" font-family="Manrope, sans-serif" font-size="11" font-weight="700" fill="#56d9ff" letter-spacing="0.1em">EMVY · AI STRATEGY</text>
  
  <!-- Main Headline -->
  <text x="80" y="320" font-family="'Space Grotesk', sans-serif" font-size="64" font-weight="700" fill="white" letter-spacing="-0.03em">
    <tspan x="80" dy="0">Better AI Prompts</tspan>
    <tspan x="80" dy="80">for Small Business</tspan>
  </text>
  
  <!-- Abstract Diagram (Right Side) -->
  <g transform="translate(850, 280)">
    <!-- Line 1 -->
    <line x1="0" y1="0" x2="180" y2="0" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.3" />
    <circle cx="180" cy="0" r="4" fill="#56d9ff" />
    
    <!-- Line 2 -->
    <line x1="0" y1="40" x2="240" y2="40" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.3" />
    <circle cx="240" cy="40" r="4" fill="#56d9ff" />
    
    <!-- Line 3 -->
    <line x1="0" y1="80" x2="160" y2="80" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.3" />
    <circle cx="160" cy="80" r="4" fill="#56d9ff" />
  </g>
</svg>