name: Convex redeploy (website)

# Shared Convex deployment glad-camel-940 is last-push-wins. The board
# repo's cron redeploys board/* every 15 min at :00/:15/:30/:45, which
# wipes the website's hermes/* functions. This workflow redeploys the
# website every 5 min at :05/:20/:35/:50, so the website is the last
# pusher in each 15-min cycle (and re-pushes 2 extra times between board
# runs to keep hermes/* stable). Net: hermes is the steady-state
# ~40 min/hr, board is the steady-state ~5 min/window after each push.
# Drafts feature (uses hermes.outreach.sendEditedFromBoard) needs the
# website to be the last pusher. See project_outreach-machine memory.
#
# Required GitHub secret: CONVEX_DEPLOY_KEY (production deploy key from
# the Convex dashboard → Settings → Deploy Keys).

on:
  schedule:
    - cron: '5,20,35,50 * * * *'
  workflow_dispatch:

jobs:
  redeploy-website:
    name: Redeploy website Convex functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Deploy website functions
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: npx convex deploy --yes
