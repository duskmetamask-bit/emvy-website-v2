name: Convex redeploy (website)

# Single Convex deployer for the consolidated glad-camel-940 deployment
# (see ADR-007 in vault). The board's convex/board/* functions live in
# this repo as a mirror; the board repo's sync workflow keeps it fresh.
#
# Triggers:
#   push to main                   — website code change → immediate deploy
#   repository_dispatch (sync-board) — board sync workflow pinged us
#   schedule (5,20,35,50 * * * *)  — drift safety net
#   workflow_dispatch              — manual recovery
#
# After every deploy, the smoke test (scripts/check-convex-deploy.mjs)
# asserts that representative functions from BOTH sides are present.
# Catches the "whole other side got wiped" case in <30s instead of
# leaving the board or website broken until someone notices.

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [sync-board]
  schedule:
    - cron: '5,20,35,50 * * * *'
  workflow_dispatch:

jobs:
  redeploy-website:
    name: Redeploy website Convex functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Deploy website functions
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: npx convex deploy --yes

      - name: Smoke test — both sides present
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
        run: node scripts/check-convex-deploy.mjs
