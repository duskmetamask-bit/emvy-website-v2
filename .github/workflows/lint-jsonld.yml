name: Lint JSON-LD

# Validates that every JSON-LD block on the live routes is a well-formed
# schema.org object. Runs after build: starts next start, fetches each
# route, extracts <script type="application/ld+json"> blocks, JSON.parses
# each, asserts @context / @type / round-trip, then tears the server down.

on:
  push:
    paths:
      - 'lib/schema/**'
      - 'components/JsonLd.tsx'
      - 'app/**/layout.tsx'
      - 'app/**/page.tsx'
      - 'scripts/lint-jsonld.mjs'
      - '.github/workflows/lint-jsonld.yml'
  pull_request:
    paths:
      - 'lib/schema/**'
      - 'components/JsonLd.tsx'
      - 'app/**/layout.tsx'
      - 'app/**/page.tsx'
      - 'scripts/lint-jsonld.mjs'
      - '.github/workflows/lint-jsonld.yml'
  workflow_dispatch:

jobs:
  lint:
    name: Build + validate JSON-LD
    runs-on: ubuntu-latest
    env:
      STRIPE_SECRET_KEY: sk_test_ci_placeholder
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Type-check builders
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Start server
        run: |
          nohup npx next start -p 3000 > /tmp/next.log 2>&1 &
          echo $! > /tmp/next.pid
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null http://localhost:3000/; then
              echo "ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "server did not become ready in 30s"
          cat /tmp/next.log
          exit 1

      - name: Lint JSON-LD on key routes
        run: node scripts/lint-jsonld.mjs http://localhost:3000/

      - name: Stop server
        if: always()
        run: |
          if [ -f /tmp/next.pid ]; then
            kill "$(cat /tmp/next.pid)" 2>/dev/null || true
          fi
          pkill -f "next start" 2>/dev/null || true
